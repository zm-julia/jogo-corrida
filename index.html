<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./img/img_favicon3.png" type="image/x-icon">
    <title>Fast & Fabulous</title>
</head>

<body>
    <div class="container">
        <button class="btn-jogar" onclick="iniciarJogo(1)">1 PLAYER</button>

        <button class="btn-jogar2" onclick="iniciarJogo(2)">2 PLAYERS</button>

        <button class="btn-como" onclick="location.href='comoJogar.html'">COMO JOGAR</button>

        <button class="btn-sobre" onclick="location.href='sobre.html'">SOBRE</button>



    </div>

    <script>
        function iniciarJogo(modo) {
            localStorage.setItem("modoJogo", modo)
            location.href = "jogo.html"
        }
    </script>
</body>

</html>
